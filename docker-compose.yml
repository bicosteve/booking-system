services:
  booking-system:
    image: bixoloo/booking-system:${IMAGE_TAG:-latest}
    container_name: booking-system
    restart: unless-stopped
    env_file:
      - .env

    ports:
      - "127.0.0.1:${PORT:-7001}:${PORT:-7001}"
      - "127.0.0.1:${ADMIN_PORT:-7002}:${ADMIN_PORT:-7002}"

    environment:
      ENV: "prod"

    healthcheck:
      test:
        ["CMD-SHELL", "curl -fsS http://127.0.0.1:${PORT:-7001}/api/health/test"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

    networks:
      - bookingnet

  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    restart: unless-stopped
    env_file:
      - alloy.env
    command:
      - "run"
      - "/etc/alloy/config.alloy"
      - "--server.http.listen-addr=0.0.0.0:12345"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config.alloy:/etc/alloy/config.alloy:ro
    depends_on:
      - booking-system

    networks:
      - bookingnet

networks:
  bookingnet:
    driver: bridge
